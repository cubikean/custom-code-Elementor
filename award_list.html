<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWWWARD - List</title>

    <style>
        .benlo-awards_container{
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width: 70%;
            margin: 0 auto;
        }
        .benlo-awards_single_project{
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #181818;
            position: relative;
            padding: 20px 0;
            width: 100%;
        }
        [data-name], [data-year]{
            font-size: 30px;
        }
        [data-cross]{
            
        }
        .benlo-awards_single_project:last-child{
            border-bottom: 1px solid #181818;
        }
        .benlo-awards_image{
            position: absolute;
        }
        .benlo-awards_image img{
            min-width: 140px;
            max-width: 140px;
            opacity: 0;
            visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            position: fixed;
            pointer-events: none;
            transform: translate(calc(-50% + 15px), -50%);
        }
    </style>
</head>
<body>
    <div class="benlo-awards_container">
        <div class="benlo-awards_single_project">
            <div data-name="benlo"><span>nom du projet</span></div>
            <div data-year="2020"><span>2020</span></div>
            <div data-cross="">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-plus" viewBox="0 0 16 16">
                    <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                </svg>
            </div>
            <div class="benlo-awards_image"><img src="assets/images/arrow.png" alt=""></div>
        </div>
        <div class="benlo-awards_single_project">
            <div data-name="benlo"><span>nom du projet</span></div>
            <div data-year="2020"><span>2019</span></div>
            <div data-cross="">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-plus" viewBox="0 0 16 16">
                    <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                </svg>
            </div>
            <div class="benlo-awards_image"><img src="assets/images/croix_rouge.png" alt=""></div>
        </div>
        <div class="benlo-awards_single_project">
            <div data-name="benlo"><span>nom du projet</span></div>
            <div data-year="2020"><span>2018</span></div>
            <div data-cross="">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-plus" viewBox="0 0 16 16">
                    <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                </svg>
            </div>
            <div class="benlo-awards_image"><img src="assets/images/sc_L_N.png" alt=""></div>
        </div>
    </div>
    

    <script>
        let images = document.querySelectorAll('.benlo-awards_image img')
        let selection = document.querySelectorAll('.benlo-awards_single_project')

        

        for (let i = 0; i < selection.length; i++) {
            selection[i].addEventListener('mousemove',(e)=>{
                selection[i].style.cursor = "none"
                var x = e.clientX;
                var y = e.clientY;
                images[i].style.opacity = "1"
                images[i].style.visibility = "visible"
                images[i].style.transform = `translate3d(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%), 0)`;
            })

            selection[i].addEventListener('mouseleave',(e)=>{
                images[i].style.opacity = "0"
                images[i].style.visibility = "hidden"
            })

        }
        


    </script>
</body>
</html>
