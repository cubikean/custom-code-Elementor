<style>
  body {
    margin: 0;
  }

  .container {
    height: 600px;
    width: 40%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    flex-direction: column;
    overflow-y: auto;
    background-color: #FEDF62;
  }
  .section {
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .change-color {
    position: fixed;
    right: 20px;
    bottom: 20px;
    padding: 15px;
    background-color: black;
    color: white;
    cursor: pointer;
  }
</style>

<main class="container">
  <section data-color="#FEDF62" class="section s-1">section 1</section>
  <section data-color="#EEBDCD" class="section s-2">section 2</section>
  <section data-color="#CC2634" class="section s-3">section 3</section>
</main>
<h2>test</h2>

<script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
  const sections = gsap.utils.toArray(".section");
  const container = document.querySelector(".container");
  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: ".container",
      pin: true,
      scrub: true,
      end: () => `+=${container.offsetWidth}`,
    },
  });

  tl.to(container, {duration: 2,backgroundColor: "#FEDF62", ease: "none",})
    .to(container, { duration: 1, backgroundColor: "#EEBDCD", ease: "none" }, 0)
    .to(container, { duration: 1, backgroundColor: "#CC2634", ease: "none" }, 1);
</script>
