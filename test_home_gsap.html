<style>
    body{
        margin: 0;
    }

    header{
        height: 100vh;
        overflow-y: auto;
    }
    .root{
        
    }
    .section {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .change-color {
      position: fixed;
      right: 20px;
      bottom: 20px;
      padding: 15px;
      background-color: black;
      color: white;
      cursor: pointer;
    }
  </style>


  <header>
  <main class="root">
    <section id="id" data-color="#FEDF62" class="section s-1">section 1</section>
    <section data-color="#EEBDCD" class="section s-2">section 2</section>
    <section data-color="#CC2634" class="section s-3">section 3</section>
  </main>
</header>
  
  <script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script>
    let updateFns = gsap.utils.toArray(".section").map(function (elem) {
      var color = elem.getAttribute("data-color");
      console.log(elem)
      let trigger = ScrollTrigger.create({
        trigger: elem,
        start: "top 5%",
        end: "bottom 20%",
        markers: true,
        onToggle() {
          gsap.to("main", {
            backgroundColor: color,
            duration: 1,
          });
        },
      });
  
      return () => {
        color = elem.getAttribute("data-color");
        if (trigger.isActive) {
          gsap.killTweensOf("main");
          gsap.set("main", {
            backgroundColor: color,
          });
        }
      };
    });
  
   
  </script>
