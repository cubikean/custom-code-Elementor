<script>
    
  document.addEventListener("DOMContentLoaded", function() {
    var paths = document.querySelectorAll('path');

    paths.forEach(function(path, index) {
      var length = path.getTotalLength();

      path.style.strokeDasharray = length;
      path.style.strokeDashoffset = length;

      var styleSheet = document.styleSheets[0];
      var keyframesName = `draw${index}`;
      var keyframes = `
        @keyframes ${keyframesName} {
          to {
            stroke-dashoffset: ${2*length};
          }
        }
      `;
      styleSheet.insertRule(keyframes, styleSheet.cssRules.length);

      // Utiliser IntersectionObserver pour détecter quand le path est visible
      var observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            console.log(entry)
          if (entry.isIntersecting) {
            path.style.animation = `${keyframesName} 1.2s ease forwards`;
            observer.unobserve(path); // On arrête d'observer une fois que l'animation est déclenchée
          }
        });
      }, { threshold: .7 }); // L'animation se déclenche quand au moins 10% du path est visible

      observer.observe(path);
    });
  });
</script>
