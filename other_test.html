<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="rgb(24, 97, 54)" />
    <title>Document</title>
    <style>
      body {
        font-family: Sentinel SSm A, Sentinel SSm B, system-ui, -apple-system,
          BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif,
          Apple Color Emoji, Segoe UI Emoji, Segoe UI Symbol;
        /* background: rgb(24, 97, 54); */
        padding: 0;
        margin: 0;
      }
      ::-webkit-scrollbar {
        display: none;
      }
      .btn_next{
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: none;
        background-color: aquamarine;
        font-size: 30px;
      }
      .container{
        width: 70%;
        margin: 0 auto;
      }
      .scroller {
        border-radius: 250px;
        scroll-behavior: smooth;
        position: relative;
        width: 400px;
        margin: 0 auto;
        height: 800px;
        scroll-snap-type: y mandatory;
        background-color: rgb(254, 223, 98);
        overflow-y: scroll;
        cursor: grab;
      }
      .rect_anime{
        height: 400px;
        border-radius: 50%;
        width: 400px;
        z-index: -20;
        top: 600px;
        left: 50%;
        right: 50%;
        transform: translate(-50%, 0%);
        background-color: red;
        position: absolute;
        animation-name: rect_anime;
      }
      @keyframes rect_anime {
        from{
          top: 570px;
          width: 280px;
          height: 200px;
        }
        50%{
          width: 500px;
          height: 400px;
        }
        to{
          top: 0px;
          width: 300px;
          height: 200px;
        }
        
      }
      @keyframes infinitMovement {
        0%{
          transform: translateY(10px);
        }
        25%{
        }
        50%{
          transform: translateY(-10px);
        }
        75%{
        }
        100%{
          transform: translateY(10px);
        }
        
      }
      .child {
        height: 100%;
        scroll-snap-align: start;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .space {
        height: 100vh;
      }
      .image_container{
        display: flex;
        position: relative;
        flex-direction: column;
        align-items: center;
        transform: translate(0px, -800px);
        width: 100%;
        scroll-behavior: smooth;
        height: 800px;
        scroll-snap-type: y mandatory;
        overflow-y: scroll;
        cursor: grab;
      }
      .image_container .image_container_single{
        display: flex;
        align-items: center;
        justify-content: center;
        max-height: 800px;
        z-index: -6;
        scroll-snap-align: start;
        min-height: 800px;
      }
      .image_container .image_container_end{
        display: flex;
        align-items: center;
        justify-content: center;
        max-height: 20px;
        z-index: -6;
        scroll-snap-align: start;
        min-height: 20px;
      }
      .image_container .image_container_single img{
        width: 100%;
        object-fit: contain;
        max-height: 600px;
        min-height: 400px;
        z-index: -6;
      }
      .image_container .image_container_single img:nth-child(1){
        animation: 3s ease-in-out infinite infinitMovement ;
      }
      .image_container .image_container_single img:nth-child(2){
        animation: 5s ease-in-out infinite infinitMovement ;
      }

    </style>
  </head>
  <body>
    <div class="container">

      <button class="btn_next">Change Slide</button>

      <div class="scroller">
        <div id="child_1" class="child"></div>
        <div id="child_2" class="child"></div>
        <div id="child_3" class="child"></div>

      </div>
      
      <div class="image_container" data-position="0">
        <div id="first" class="image_container_single">
          <img src="assets/images/sc_L.png" alt="">
          <img src="assets/images/sc_R.png" alt="">
        </div>
        <div id="second" class="image_container_single">
          <img src="assets/images/alpine.png" alt="">
        </div>
        <div id="third" class="image_container_single">
          <img src="assets/images/croix_rouge.png" alt="">
          <img src="assets/images/croix_rouge_vector.png" alt="">
        </div>
        <div id="four" class="image_container_end"></div>
      </div>
      <div class="rect_anime"></div>
    </div>
    
    <h2>coucou</h2>
    <div class="space">test</div>

    <!--

    <script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <script>

      // Check if the media query matches or is not available.

        gsap.to(".scroller", {duration: 1,backgroundColor: "#FEDF62",ease: "none"});

        let color_test = ["254", "223", "98"];

          let image_container = document.querySelector('.image_container')
          let rect_anime = document.querySelector('.rect_anime')

          let scroller = document.querySelector(".scroller");
          let posM = scrollPos / (scroller.scrollHeight / 3);
          console.log("scrollPos = ", scrollPos);
          console.log("posM = ", posM);
          // let color = `rgb( ${254} ${223} ${98})`;
          // let colorA = `rgb( ${254} ${223} ${98})`;

          // const color = `rgb(${saturation} ${saturation} ${saturation})`;
          // scroller.style.backgroundColor = color;
          
          if (scrollPos < 600) {
            console.log('')
            // image_container.style.transform = "translate(0px, -800px)"
            // color = `rgb( ${254} ${223 * posM} ${98})`;
            gsap.to(".scroller", {duration: .4,backgroundColor: "#FEDF62",ease: "none"});
            
            // console.log('child_1 pos = ', child_1.getBoundingClientRect())
            // console.log('child_1_RectOffset =' ,child_1_RectOffset)
            // console.log('snap = ',snap)
            // console.log("color =", color);
            // scroller.style.transition = ".4s ease-in-out";
            // scroller.style.backgroundColor = color;
          } else if (scrollPos >= 600 && scrollPos <= 1200) {
            // image_container.style.transform = "translate(0px, -1600px)"
            // color = `rgb( ${238} ${189 * posM} ${205})`;




            // Gsap animation elastic
            // let rect_anime = document.querySelector('.rect_anime')
            // gsap.fromTo(".rect_anime", {
            //     y:0,
            //     duration: .4,
            //     width:400,
            //     ease: Elastic.easeOut.config(1,.4)
            // });
            

            
           
            gsap.to(".scroller", {duration: .4,backgroundColor: "#EEBDCD",ease: "none"});
           
            // console.log("color = ", color);
            // scroller.style.transition = ".4s ease-in-out";
            // scroller.style.backgroundColor = color;
          } else if (scrollPos >= 1400) {
            console.log(" > 800");
            

            // image_container.style.transform = "translate(0px, -2400px)"
            // color = `rgb( ${204} ${38 * posM} ${52})`;
            // console.log("color = ", color);
            // scroller.style.transition = ".4s ease-in-out";
            gsap.to(".scroller", {duration: .4,backgroundColor: "#CC2634",ease: "none"});
            // scroller.style.backgroundColor = color;
          }
        if (scrollPos >= 1620) {
            console.log(" > 1620");
            // color = `rgb( ${204} ${38 * posM} ${52})`;
            // console.log("color = ", color);
            // scroller.style.transition = ".4s ease-in-out";
            gsap.to(".scroller", {duration: .4,backgroundColor: "#FEDF62",ease: "none"});
            // scroller.style.backgroundColor = color;
          }
          //   document.querySelector('meta[name="theme-color"]').setAttribute("content", color);
        }


       

        let scroller = document.querySelector(".image_container");

        scroller.addEventListener("scroll", function (e) {
          // let scroller = document.querySelector(".image_container");

          lastKnownScrollPosition = scroller.scrollTop;
          console.log('lastKnownScrollPosition',lastKnownScrollPosition);

          if (!ticking) {
            window.requestAnimationFrame(function () {
              changeColor(lastKnownScrollPosition);
              ticking = false;
            });

            ticking = true;
          }
        });
        let btn_next = document.querySelector('.btn_next')
        let value =  0;
        
      btn_next.addEventListener('click', (e)=>{
        setTimeout(() => {
          lastKnownScrollPosition = scroller.scrollTop;
          console.log('lastKnownScrollPosition BTN COOL : ',lastKnownScrollPosition);
        }, 610);
        
        value = lastKnownScrollPosition + 800
        if (value >= 2000){
          value = 0
        }
        parent.scrollTop = value
        
        
      })

      }
      document
        .querySelector(".image_container")
        .addEventListener("wheel", preventScroll, { passive: false });

      function preventScroll(e) {
        e.preventDefault();
        e.stopPropagation();

        return false;
      }

      const child = document.querySelectorAll("section");
      const parent = document.querySelector(".image_container");

      let startX;
      let scrollTop;
      let isDown;

      

      parent.addEventListener("mousedown", (e) => mouseIsDown(e));
      parent.addEventListener("mouseup", (e) => mouseUp(e));
      parent.addEventListener("mouseleave", (e) => mouseLeave(e));
      parent.addEventListener("mousemove", (e) => mouseMove(e));

      function mouseIsDown(e) {
        isDown = true;
        startY = e.pageY - parent.offsetTop;
        scrollTop = parent.scrollTop;
      }
      function mouseUp(e) {
        isDown = false;
      }
      function mouseLeave(e) {
        isDown = false;
      }
      function mouseMove(e) {
        if (isDown) {
          e.preventDefault();
          //Move vertcally
          const y = e.pageY - parent.offsetTop;
          const walkY = (y - startY) * 2;
          parent.scrollTop = scrollTop - walkY;
          if (scrollTop - walkY >= 1620){
            parent.scrollTop = 0
          }
        }
      }
    </script>
  </body>
</html>
