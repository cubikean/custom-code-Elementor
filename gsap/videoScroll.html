<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    .container-video {
      /* max-width: 1200px; */
      margin-inline: auto;
      height: 100vh;
      position: relative;
    }
    .spacer {
      height: 200px;
    }
    video {
      position: relative !important;
      /* top: 0 !important; */
      width: 100%;
      display: block;
      margin-inline: auto !important;
      object-fit: cover;
      height: 100%;
    }
    .absolText {
      position: absolute;
      top: 150px;
      font-size: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      color: white;
      opacity: 0;
    }
    .bottomVideoBlur {
      position: absolute;
      bottom: 0;
      left: 0;
      background: linear-gradient(0deg, black, black 15%, transparent);
      height: 50vh;
      opacity: 1;
      width: 100%;
    }
    .section-color {
      background-color: black;
    }
  </style>
  <body>
    <div class="container-video">
      <h1>coucou les loulous</h1>
      <!-- <img src="https://via.placeholder.com/850" alt="" /> -->

      <div class="spacer"></div>
    </div>
    <div class="spacer"></div>

    <div class="container-video">
      <video autoplay muted playsinline loop >
        <source src="https://youtu.be/dQw4w9WgXcQ" type="video/mp4" />
      </video>
      <div class="bottomVideoBlur"></div>
      <h2 class="absolText">test de texte sur la vidéo</h2>
    </div>

    <div class="container-video section-color">
      <div class="spacer"></div>
      <h2>A plus tout le monde !</h2>
      <div class="spacer"></div>
      <div class="spacer"></div>
      <div class="spacer"></div>
      <div class="spacer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js"></script>

    <script>
      const video = document.querySelector("video");
      const absolText = document.querySelector(".absolText");
      const backVideo = document.querySelector(".bottomVideoBlur");
      const containervideo = document.querySelectorAll(".container-video");
      let tl = gsap.timeline({
        scrollTrigger: {
          trigger: video,
          start: "top 30%",
          end: "top top",
          markers: true,
          scrub: 2,
        //   pin:true,
        },
      });
      tl.from(video, {position:'relative', width: "65%", duration: 0.3 });
    //   tl.from(absolText, { opacity: 0, duration: 0.2 });
      tl.from(backVideo, {opacity: 0, duration: 0.3 });

      gsap.to(absolText, {
        scrollTrigger: {
          trigger: absolText,
          start: "top 20%",
          markers: true,
          toggleActions: "play none none reverse",
          // pin: ".box1",
          pinSpacing: false,
        },
        y:-15,
        opacity: 1,
        duration: 1,
      });
    </script>
  </body>
</html>
