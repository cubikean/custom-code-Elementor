<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Swiper demo</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css"
    />

    <!-- Demo styles -->
    <style>
      html,
      body {
        position: relative;
        height: 100%;
      }

      body {
        background: #eee;
        font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
        font-size: 14px;
        color: #000;
        margin: 0;
        padding: 0;
      }

      .swiper {
        width: 25%;
        height: 300px;
      }
      .swiper:hover {
        cursor: pointer;
      }

      .swiper-slide {
        text-align: center;
        font-size: 18px;
        background: #fff;

        /* Center slide text vertically */
        display: -webkit-box;
        display: -ms-flexbox;
        display: -webkit-flex;
        display: flex;
        -webkit-box-pack: center;
        -ms-flex-pack: center;
        -webkit-justify-content: center;
        justify-content: center;
        -webkit-box-align: center;
        -ms-flex-align: center;
        -webkit-align-items: center;
        align-items: center;
      }

      .swiper-slide img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      body .swiper-slide{
        background-color: rgb(129, 49, 55);
        
      }
      
      .a {
        background-color: rgb(204, 38, 52);

      }
      .b {
        background-color: rgb(204, 38, 52);
        -webkit-transition: background-color .4s ease-out;
        -moz-transition: background-color .4s ease-out;
        -o-transition: background-color .4s ease-out;
        transition: background-color .4s ease-out;
      }
      .c {
        background-color: rgb(204, 38, 52);
        -webkit-transition: background-color .4s ease-out;
        -moz-transition: background-color .4s ease-out;
        -o-transition: background-color .4s ease-out;
        transition: background-color .4s ease-out;
      }
    </style>
  </head>

  <body>
    <!-- Swiper -->
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide a">Slide 1</div>
        <div class="swiper-slide b">Slide 2</div>
        <div class="swiper-slide c">Slide 3</div>
      </div>
      <div class="swiper-pagination"></div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script>
      var swiper = new Swiper(".mySwiper", {
        direction: "vertical",
        loop: true,
        pagination: {
          el: ".swiper-pagination",
          clickable: true,
        },
      });
    </script>

    <script>
        window.addEventListener('load',()=>{

        let swiper = document.querySelector('.swiper')
        let a = document.querySelector('.a')
        let b = document.querySelector('.b')
        let c = document.querySelector('.c')
        let swiper_slide_active = document.querySelector('.swiper-slide-active')
      });

        
    </script>
  </body>
</html>
