<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Swiper demo</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css"
    />

    <!-- Demo styles -->
    <style>
      html,
      body {
        position: relative;
        height: 100%;
      }

      body {
        background: #eee;
        font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
        font-size: 14px;
        color: #000;
        margin: 0;
        padding: 0;
      }

      .swiper {
        width: 25%;
        height: 300px;
      }
      .swiper:hover {
        cursor: pointer;
      }

      .swiper-slide {
        text-align: center;
        font-size: 18px;
        background: #fff;

        /* Center slide text vertically */
        display: -webkit-box;
        display: -ms-flexbox;
        display: -webkit-flex;
        display: flex;
        -webkit-box-pack: center;
        -ms-flex-pack: center;
        -webkit-justify-content: center;
        justify-content: center;
        -webkit-box-align: center;
        -ms-flex-align: center;
        -webkit-align-items: center;
        align-items: center;
      }

      .swiper-slide img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      body .swiper-slide{
        background-color: #FEDF62;
        transition: all .5s ease-in-out;
        
      }
   
    </style>
  </head>

  <body>
    <!-- Swiper -->
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        <section id="1" data-color="#FEDF62" class="swiper-slide">Slide 1</section>
        <section id="2" data-color="#EEBDCD" class="swiper-slide">Slide 2</section>
        <section id="3" data-color="#CC2634" class="swiper-slide">Slide 3</section>
      </div>
      <div class="swiper-pagination"></div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script>
      var swiper = new Swiper(".mySwiper", {
        direction: "vertical",
        // loop: true,
        pagination: {
          el: ".swiper-pagination",
          clickable: true,
        },
      });
    </script>

    <script>
      let test = document.querySelector('.swiper-slide')
      let color = ['#FEDF62','#EEBDCD','#CC2634']
      let cpt = 0
      swiper.on('slideNextTransitionStart',function(e) {
          cpt ++
          console.log('slide changed');
          // console.log(e.el.children[0].children[0])
          e.el.children[0].children[0].style.backgroundColor = color[cpt]
          e.el.children[0].children[0].style.transition = 'all .5s ease-in-out'
          e.el.children[0].children[1].style.backgroundColor = color[cpt]
          e.el.children[0].children[1].style.transition = 'all .5s ease-in-out'
          e.el.children[0].children[2].style.backgroundColor = color[cpt]
          e.el.children[0].children[2].style.transition = 'all .5s ease-in-out'
          if (cpt >= 2 ){
            cpt = 2
          }
          console.log(cpt)
      })
      swiper.on('slidePrevTransitionStart',function(e) {
          cpt --
          console.log('slide changed');
          // console.log(e.el.children[0].children[0])
          e.el.children[0].children[0].style.backgroundColor = color[cpt]
          e.el.children[0].children[0].style.transition = 'all .5s ease-in-out'
          e.el.children[0].children[1].style.backgroundColor = color[cpt]
          e.el.children[0].children[1].style.transition = 'all .5s ease-in-out'
          e.el.children[0].children[2].style.backgroundColor = color[cpt]
          e.el.children[0].children[2].style.transition = 'all .5s ease-in-out'
          if (cpt <= 0 ){
            cpt = 0
          }
          console.log(cpt)

      })
    </script>
    <script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
      let updateFns = gsap.utils.toArray(".section").map(function (elem) {
        var color = elem.getAttribute("data-color");
    
        let trigger = ScrollTrigger.create({
          trigger: elem,
          start: "top 50%",
          end: "bottom 50%",
          markers: false,
          onToggle() {
            gsap.to("main", {
              backgroundColor: color,
              duration: 1,
            });
          },
        });
    
        return () => {
          color = elem.getAttribute("data-color");
          if (trigger.isActive) {
            gsap.killTweensOf("main");
            gsap.set("main", {
              backgroundColor: color,
            });
          }
        };
      });
    
     
    </script>
  </body>
</html>
