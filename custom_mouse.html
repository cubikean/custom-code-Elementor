<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        cursor: none;
      }
      body {
        height: 300vh;
      }
      .mouse_border {
        min-width: 30px;
        min-height: 30px;
        width: 30px;
        height: 30px;
        max-width: 45px;
        max-height: 45px;
        border-radius: 50%;
        border: 1px solid black;
        transition: all 200ms ease-out;
        position: fixed;
        pointer-events: none;
        left: 0;
        top: 0;
        transform: translate(calc(-50% + 15px), -50%);
      }
      .mouse_inner {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: black;
        position: fixed;
        transform: translate(-50%, -50%);
        pointer-events: none;
        transition: width 0.3s, height 0.3s, opacity 0.3s;
      }
      .cursorinnerhover {
        width: 31px;
        height: 31px;
      }
    </style>
  </head>
  <body>
    <div class="mouse_border"></div>
    <div class="mouse_inner"></div>
    <a href="#">lzpdlzpdlpz</a>
    

    <script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
      const cursor = document.querySelector(".mouse_border");
      const cursorinner = document.querySelector(".mouse_inner");
      const a = document.querySelectorAll('a');
      const cursorPositionX = 0;
      const cursorPositionY = 0;
      const oldCursorPositionX = 0;
      const oldCursorPositionY = 0;

      const newX = oldCursorPositionX - cursorPositionX
      const newY = oldCursorPositionY - cursorPositionY
      const R = Math.min(20, Math.sqrt(newX * newX + newY * newY)) / 10
      const I = 180 * Math.atan2(newY, newX) / Math.PI;

      document.addEventListener("mousemove", function (e) {
        var x = e.clientX;
        var y = e.clientY;
        // cursor.style.transform = `translate3d(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%), 0)`;
      });

      document.addEventListener("mousemove", function (e) {
        var x = e.clientX;
        var y = e.clientY;
        cursorinner.style.left = x + "px";
        cursorinner.style.top = y + "px";
      });

      document.addEventListener("mousedown", function () {
        cursor.classList.add("click");
        cursorinner.classList.add("cursorinnerhover");
      });

      document.addEventListener("mouseup", function () {
        cursor.classList.remove("click");
        cursorinner.classList.remove("cursorinnerhover");
      });

      a.forEach((item) => {
        item.addEventListener("mouseover", () => {
          cursorinner.classList.add("cursorinnerhover");
        });
        item.addEventListener("mouseleave", () => {
          cursorinner.classList.remove("cursorinnerhover");
        });
      });

      //SPEED

      var prevEvent, currentEvent;
      document.documentElement.onmousemove = function (event) {
        currentEvent = event;
      };

      var maxSpeed = 0,
        prevSpeed = 0,
        maxPositiveAcc = 0,
        maxNegativeAcc = 0;
      setInterval(function () {
        if (prevEvent && currentEvent) {
          var movementX = Math.abs(currentEvent.screenX - prevEvent.screenX);
          var movementY = Math.abs(currentEvent.screenY - prevEvent.screenY);
          var movement = Math.sqrt(
            Math.min(20, Math.sqrt(movementX * movementX + movementY * movementY)) / 10
          );
          var rotateTest = 180 * Math.atan2(movementY, movementX) / Math.PI;

          //speed=movement/100ms= movement/0.1s= 10*movement/s
          var speed = 10 * movement; //current speed
          var acceleration = 10 * (speed - prevSpeed);
          console.log(movement)
          // console.log(acceleration);
          cursorinner.style.transform = `scaleX(${1 + movement}) rotate(${rotateTest}deg)`;
          // cursor.style.transform = ;
          // cursor.style.transform = ``;
        }

        prevEvent = currentEvent;
        prevSpeed = speed;
      }, 100);
    </script>
  </body>
</html>
